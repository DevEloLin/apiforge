name: Release

# Tag-only: a plain push never triggers this — only pushing a version tag does.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release and upload the binaries

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Sanity gate before we ship: fmt + vet + tests must pass.
      - name: Verify
        run: |
          test -z "$(gofmt -l .)" || (gofmt -l . && echo 'run gofmt -w .' && exit 1)
          go vet ./...
          go test ./...

      # Build the static binaries. linux/arm64 is what devops-01 (aarch64 Pi) needs;
      # linux/amd64 is included so the release is reusable on x86 servers too.
      - name: Build binaries
        run: bash deploy/build.sh linux/arm64 linux/amd64

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/apiforge-linux-arm64 \
            dist/apiforge-linux-amd64 \
            dist/SHA256SUMS \
            --title "apiforge ${GITHUB_REF_NAME}" \
            --generate-notes
