name: CI

# Run ONLY when code / deps / this workflow change — docs- or deploy-script-only
# commits skip CI entirely (saves Actions minutes).
on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/ci.yml'

# A newer push to the same ref cancels an in-progress run (no stacked runs).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest   # 1x cost multiplier (never macos = 10x)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          fmt="$(gofmt -l .)"
          if [ -n "$fmt" ]; then
            echo "These files need gofmt -w ."
            echo "$fmt"
            exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...
