# apiforge — docker-compose. See docs/OPERATIONS.md for the full guide.
#   docker compose up -d --build
# Publish only to 127.0.0.1 and front with new-api / Cloudflare Tunnel for public use.
services:
  apiforge:
    build: .                       # or: image: ghcr.io/develolin/apiforge:latest
    container_name: apiforge
    restart: unless-stopped
    # The scratch image runs as uid 65532; your host credential files are usually
    # 0600 owned by your login uid, so run the container AS that uid or it can't
    # read/write them. Set to the credential owner's `id -u`:`id -g` (Pi/Debian
    # first user is typically 1000). Override: APIFORGE_UID=… APIFORGE_GID=… docker compose up
    user: "${APIFORGE_UID:-1000}:${APIFORGE_GID:-1000}"
    ports:
      - "127.0.0.1:8899:8899"
    environment:
      API_KEYS: "sk-change-me"
      # ADMIN_TOKEN: "change-me-admin"
      MAX_ACCOUNT_CONCURRENCY: "3"
      QUEUE_WAIT_MS: "60000"
      GOMEMLIMIT: "64MiB"
      # scratch image has no $HOME — use explicit credential paths:
      CODEX_AUTHS: "/creds/codex/auth.json"
      CLAUDE_AUTHS: "/creds/claude/.credentials.json"
      # DEEPSEEK_API_KEYS: "sk-..."
      # GROK_COOKIES: "sso=..."
    volumes:
      # Mount WRITABLE (no :ro) so refreshed OAuth tokens persist back to disk.
      - "${HOME}/.codex:/creds/codex"
      - "${HOME}/.claude:/creds/claude"
    mem_limit: 128m
